    <!-- TEMP DIAGNOSTIC: surface any uncaught JS error / promise rejection / render loop
         as an on-screen red bar so a non-technical admin can report it. Remove once fixed. -->
    <script>
      (function () {
        function show(msg) {
          try {
            var b = document.getElementById('__diag');
            if (!b) {
              b = document.createElement('div');
              b.id = '__diag';
              b.style.cssText = 'position:fixed;left:0;right:0;bottom:0;z-index:2147483647;background:#b00020;color:#fff;font:12px/1.45 monospace;padding:10px 14px;white-space:pre-wrap;max-height:45vh;overflow:auto;box-shadow:0 -2px 12px rgba(0,0,0,.45)';
              (document.body || document.documentElement).appendChild(b);
            }
            b.textContent = '⚠ ERROR (i-screenshot mo ito para kay Kenya):\n' + msg;
          } catch (_) { /* noop */ }
        }
        window.addEventListener('error', function (e) {
          show((e && e.message ? e.message : 'error') + (e && e.filename ? '\n@ ' + e.filename + ':' + e.lineno : ''));
        });
        window.addEventListener('unhandledrejection', function (e) {
          var r = e && e.reason;
          show('Promise rejection: ' + (r && (r.code || r.message) ? ((r.code ? r.code + ' ' : '') + (r.message || '')) : String(r)));
        });
      })();
    </script>
